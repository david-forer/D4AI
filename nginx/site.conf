# Redirect HTTP to HTTPS (non-www)
server {
  listen 80;
  server_name davidjforer.com www.davidjforer.com;
  return 301 https://davidjforer.com$request_uri;
}

# Redirect www to non-www over HTTPS
server {
  listen 443 ssl;
  server_name www.davidjforer.com;
  return 301 https://davidjforer.com$request_uri;
}

# Main site — static Astro build
server {
  listen 443 ssl;
  server_name davidjforer.com;

  root /app/dist;
  index index.html;

  # Remove trailing slashes (except root /)
  rewrite ^/(.+)/$ /$1 permanent;

  # Hashed Astro assets — cache forever (filenames change on rebuild)
  location /_astro/ {
    expires 1y;
    add_header Cache-Control "public, max-age=31536000, immutable";
    access_log off;
  }

  # Images — cache 30 days
  location /images/ {
    expires 30d;
    add_header Cache-Control "public, max-age=2592000";
    access_log off;
  }

  # Fonts, icons, other static assets — cache 30 days
  location ~* \.(woff2?|ttf|eot|ico|svg|webp|png|jpg|jpeg|gif)$ {
    expires 30d;
    add_header Cache-Control "public, max-age=2592000";
    access_log off;
  }

  # HTML — short cache so updates appear quickly
  location ~* \.html$ {
    expires 1h;
    add_header Cache-Control "public, max-age=3600";
  }

  # SPA-style fallback — serve index.html for unknown routes
  location / {
    try_files $uri $uri.html $uri/ =404;
  }

  # Custom 404
  error_page 404 /404.html;
}
